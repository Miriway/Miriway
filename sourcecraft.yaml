# This file configures Sourcecraft.

# (Required)
# The source package name, no spaces
name: miriway

# (Required)
# The source package version
version: v26.01

# (Required)
# Version of the build base OS
base: ubuntu@26.04

# (Recommended)
# SPDX license identifier or 'proprietary' value
# More information available at https://spdx.org/licenses/
license: GPL-3.0

# (Recommended)
title: Miriway (alan-griffiths)

# (Required)
summary: "Miriway: a graphical shell to configure for your desktop environment"

# (Required)
description: |
  A single sentence that says what the source is, concisely and memorably.

  A paragraph of one to three short sentences, that describe what the package does.

  A third paragraph that explains what need the package meets.

  Finally, a paragraph that describes whom the package is useful for.

# (Required)
# Platforms that package targets
platforms:
  amd64:
#  arm64:
#  armhf:
#  i386:
#  ppc64el:
#  riscv64:
#  s390x:

adopt-info: miriway

package-repositories:
  - type: apt
    ppa: mir-team/release

parts:
  miriway:
    build-attributes:
      - enable-patchelf
    override-pull: |
      craftctl default
      # work around https://github.com/diddlesnaps/snapcraft-multiarch-action/issues/22
      git config --global --add safe.directory ${CRAFT_PART_SRC}
      craftctl set version=`git describe | cut -c 2-15`
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
    source: .
    build-packages:
      - pkg-config
      - libmiral-dev
      - libmirwayland-dev
      - libboost-exception-dev
      - libboost-filesystem-dev
      - libfreetype6-dev
      - libwayland-dev
      - libxkbcommon-dev
      - g++
      - make
      - git
